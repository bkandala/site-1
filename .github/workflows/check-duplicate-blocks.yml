name: Check for duplicate blocks

on:
  pull_request:
    paths:
      - 'blocks/**'

jobs:
  check-duplicates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/ci/check-duplicate-blocks.js
        env:
          FEDLIBS_ORIGIN: https://main--fedlibs--your-org.aem.live
